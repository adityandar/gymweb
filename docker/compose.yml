services:
  postgres:
    image: postgres:17-alpine
    container_name: gymweb-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gymweb
      POSTGRES_USER: gymweb
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    container_name: gymweb-mail
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
